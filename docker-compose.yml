version: '3.8'
services:
  app:
    image: yang0709/schedule-management-backend:latest
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/schedule-management
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - PORT=3000
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backup:
    image: mongo:7
    volumes:
      - ./backups:/backups
    environment:
      # ⚠️ 这里的数据库名称必须与 app 服务的一致
      - MONGO_URI=mongodb://mongo:27017/schedule-management
      - BACKUP_RETENTION_DAYS=7
    entrypoint: >
      sh -c "
      while true; do
        FILENAME=/backups/backup-$$(date +%Y%m%d-%H%M%S).archive.gz;
        echo \"Starting backup to $$FILENAME... \";
        mongodump --uri=\"$$MONGO_URI\" --archive=\"$$FILENAME\" --gzip;
        if [ $$? -eq 0 ]; then
          echo 'Backup successful.';
          # 删除过期备份
          find /backups -name 'backup-*.archive.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete;
        else
          echo 'Backup failed!';
        fi
        sleep 86400;
      done"
    depends_on:
      - mongo

volumes:
  mongo_data: